services:
  - type: web
    name: qauto-api
    env: python
    plan: starter
    region: frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn api.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --workers=2 --max-requests=1000 --max-requests-jitter=100"
    healthCheckPath: "/health"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: qauto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: qauto-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: static_site
    name: qauto-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "frontend/dist"
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://qauto-api.onrender.com"

  - type: redis
    name: qauto-redis
    plan: free
    ipAllowList: []

databases:
  - name: qauto-db
    plan: free
