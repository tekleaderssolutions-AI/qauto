# Qatar AI Platform — Render.com Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: qatar-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qatar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: qatar-cache
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: web
    name: qatar-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://qatar-api.onrender.com

  - type: redis
    name: qatar-cache
    plan: free

databases:
  - name: qatar-db
    plan: free
